<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Превью бонуса</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1115;--card:#1e2328;--card2:#252c34;--bg3:#171b21;--bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.16);--g1:#1a4731;--g2:#22c55e;--g3:#4ade80;--glow:rgba(74,222,128,0.15);--gold:#fbbf24;--text:#c8d0d8;--t2:#7a8a97;--mut:#4a5968;--wh:#e8edf2}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);padding:20px;font-family:'Inter',sans-serif;display:flex;flex-direction:column;gap:20px;max-width:420px}
.label{color:var(--mut);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:6px}

/* Вариант 1 — Баннер-полоска */
.bonus-banner{background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(251,191,36,0.05));border:1px solid rgba(251,191,36,0.35);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.bonus-icon{font-size:26px;flex-shrink:0}
.bonus-body{flex:1}
.bonus-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--gold);line-height:1}
.bonus-sub{font-size:12px;color:var(--t2);margin-top:3px}
.bonus-badge{background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:6px 12px;border-radius:7px;flex-shrink:0;white-space:nowrap}

/* Вариант 2 — Карточка с градиентом */
.bonus-card{background:linear-gradient(135deg,#1a1200,#2a1f00);border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.bonus-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.bc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bc-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold)}
.bc-icon{font-size:28px}
.bc-amount{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--gold);line-height:1}
.bc-currency{font-size:14px;color:rgba(251,191,36,0.6);margin-left:4px}
.bc-desc{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.6}
.bc-desc strong{color:var(--wh)}
.bc-btn{display:inline-block;margin-top:12px;background:linear-gradient(135deg,#92400e,#fbbf24);color:#000;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;padding:9px 20px;border-radius:7px;border:none;cursor:pointer;transition:all .2s}

/* Вариант 3 — Маленький тег-бейдж в шапке блока */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.20);color:var(--g3);padding:7px 16px;border-radius:8px;display:inline-flex;align-items:center;gap:8px}
.bonus-tag{background:linear-gradient(135deg,#92400e,#fbbf24);color:#000;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;padding:5px 10px;border-radius:6px;animation:tagPulse 2s ease-in-out infinite;white-space:nowrap}
@keyframes tagPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0.4)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}
</style>
</head>
<body>

<div class="label">ВАРИАНТ 1 — БАННЕР-ПОЛОСКА</div>
<div class="bonus-banner">
  <div class="bonus-icon">🎁</div>
  <div class="bonus-body">
    <div class="bonus-title">БОНУС НОВОМУ КЛИЕНТУ</div>
    <div class="bonus-sub">При первом обмене от $20</div>
  </div>
  <div class="bonus-badge">+50 000 ₫</div>
</div>

<div class="label">ВАРИАНТ 2 — КАРТОЧКА</div>
<div class="bonus-card">
  <div class="bc-top">
    <div class="bc-title">🎁 ПОДАРОК НОВИЧКУ</div>
    <div class="bc-icon">🦍</div>
  </div>
  <div>
    <span class="bc-amount">50 000</span><span class="bc-currency">₫</span>
  </div>
  <div class="bc-desc">
    При первом обмене от <strong>$20</strong> — получи бонус<br>
    к следующему обмену. Только для новых клиентов.
  </div>
  <button class="bc-btn">ПОЛУЧИТЬ БОНУС →</button>
</div>

<div class="label">ВАРИАНТ 3 — МИГАЮЩИЙ ТЕГ В ЗАГОЛОВКЕ</div>
<div class="sec-hd">
  <div class="sec-title">📊 Курсы валют</div>
  <div class="bonus-tag">🎁 +50 000 ₫ новым</div>
</div>

</body>
</html>
